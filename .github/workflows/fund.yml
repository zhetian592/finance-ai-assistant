name: Fund Recommender

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 01:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式: recommend (正常推荐) 或 hold (只读持仓)'
        required: false
        default: 'recommend'
        type: choice
        options:
          - recommend
          - hold

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交报告

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fund crawler
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'recommend' }}"
          python fund_crawler.py --mode $MODE

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 只添加确实存在的文件
          if [ -f "fund_report.html" ]; then
            git add fund_report.html
          fi
          if [ -f "backtest/recommendations.json" ]; then
            git add backtest/recommendations.json
          fi
          
          # 如果有变更则提交
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: fund report and recommendations [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit."
          fi
