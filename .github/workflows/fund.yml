name: 财经AI决策报告

on:
  schedule:
    # 每个交易日北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * 1-5'
  workflow_dispatch:   # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行决策报告
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python fund_crawler.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: 今日推荐
          path: 今日推荐.txt
