<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财经AI决策助手 · 仪表盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header { background: #2c3e50; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
    .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
    .header p { opacity: 0.8; font-size: 0.9rem; }
    .alert { background: #ffeaa7; color: #2d3436; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; align-items: center; justify-content: space-between; }
    .alert.show { display: flex; }
    .alert button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #636e72; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card h3 { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; color: #2c3e50; }
    pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; line-height: 1.6; }
    .loading { text-align: center; color: #999; padding: 20px; }
    .footer { text-align: center; font-size: 0.8rem; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 财经AI决策仪表盘</h1>
      <p>自动获取最新投资建议 · 风险提醒一触即达</p>
    </div>

    <!-- 新报告提示横幅 -->
    <div id="newReportAlert" class="alert">
      <span>🆕 检测到新报告已生成！</span>
      <button onclick="dismissAlert()">✕</button>
    </div>

    <!-- 报告展示区域 -->
    <div class="card">
      <h3>📈 最新决策报告</h3>
      <div id="reportContent">
        <div class="loading">正在加载最新报告...</div>
      </div>
    </div>

    <div class="footer">
      Powered by GitHub Actions · 数据仅供参考，不构成投资建议
    </div>
  </div>

  <script>
    // 你的 GitHub 仓库 raw 文件地址（请根据实际分支调整）
    const REPORT_URL = 'https://raw.githubusercontent.com/zhetian592/finance-ai-assistant/main/今日推荐.txt';
    // GitHub API 获取文件最新提交
    const API_COMMITS_URL = 'https://api.github.com/repos/zhetian592/finance-ai-assistant/commits?path=今日推荐.txt&per_page=1';

    // 页面加载时执行
    window.addEventListener('load', async () => {
      // 请求浏览器通知权限
      if (Notification.permission === 'default') {
        Notification.requestPermission();
      }
      await checkAndUpdateReport();
    });

    async function checkAndUpdateReport() {
      const reportDiv = document.getElementById('reportContent');
      const alertDiv = document.getElementById('newReportAlert');

      try {
        // 1. 获取最新报告内容
        const reportResponse = await fetch(REPORT_URL, { cache: 'no-cache' });
        if (!reportResponse.ok) throw new Error('报告文件不存在');
        const reportText = await reportResponse.text();

        // 2. 获取最新提交时间
        const commitResponse = await fetch(API_COMMITS_URL);
        const commits = await commitResponse.json();
        if (!commits.length) throw new Error('无法获取提交信息');

        const latestCommitTime = commits[0].commit.committer.date;
        const lastShown = localStorage.getItem('last_report_time');
        const isNew = !lastShown || latestCommitTime > lastShown;

        // 3. 更新报告显示区域
        reportDiv.innerHTML = `<pre>${escapeHtml(reportText)}</pre>`;

        // 4. 如果是新报告，弹出提醒
        if (isNew) {
          alertDiv.classList.add('show');
          showBrowserNotification('财经AI新报告已生成', '点击查看今日投资建议。');
          localStorage.setItem('last_report_time', latestCommitTime);
        } else {
          alertDiv.classList.remove('show');
        }
      } catch (error) {
        console.error('加载报告失败：', error);
        reportDiv.innerHTML = '<div class="loading">⚠️ 报告暂时无法加载，请稍后刷新重试。</div>';
      }
    }

    function showBrowserNotification(title, body) {
      if (Notification.permission === 'granted') {
        new Notification(title, { body });
      }
    }

    function dismissAlert() {
      document.getElementById('newReportAlert').classList.remove('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
